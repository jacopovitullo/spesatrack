services:
  spesatrack:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spesatrack
    ports:
      - "5000:5000"
    environment:
      - SUPABASE_URL
      - SUPABASE_KEY
      - TELEGRAM_TOKEN
      - TELEGRAM_CHAT_ID
      - FLASK_SECRET_KEY
      - FLASK_PORT=5000
      - FLASK_DEBUG=False
    restart: unless-stopped
