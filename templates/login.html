<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpesaTrack — Login</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    html, body { overflow: auto; }
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }
    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .auth-subtitle {
      color: var(--text2);
      font-size: 13px;
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-group input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color var(--transition);
    }
    .form-group input:focus {
      border-color: var(--accent);
    }
    .btn-auth {
      width: 100%;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      padding: 12px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity var(--transition);
    }
    .btn-auth:hover { opacity: 0.85; }
    .auth-error {
      background: rgba(255,71,87,0.12);
      border: 1px solid var(--red);
      border-radius: var(--radius-sm);
      color: var(--red);
      font-size: 13px;
      padding: 10px 12px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">💸 SpesaTrack</div>
      <div class="auth-subtitle">Accedi al tuo account</div>

      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required autocomplete="email" autofocus>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-auth">Accedi</button>
      </form>
    </div>
  </div>
</body>
</html>
